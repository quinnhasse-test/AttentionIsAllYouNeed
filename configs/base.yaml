# Base transformer config matching Vaswani et al. (2017) hyperparameters.
# Trains in ~8h on a single GPU for Multi30k EN-DE.

model:
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  max_len: 200
  dropout: 0.1

training:
  batch_size: 64
  n_epochs: 30
  warmup_steps: 4000
  label_smoothing: 0.1
  grad_clip: 1.0
  min_freq: 2
  max_src_len: 100
  checkpoint_dir: checkpoints/base

data:
  dataset: bentrevett/multi30k
  src_lang: en
  tgt_lang: de

wandb:
  project: attention-is-all-you-need
  run_name: base_multi30k
  log_attention_every: 5
